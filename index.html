<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="scene-container">
        <img class="background-image" src="background/background.png" alt="Background">

        <!-- Notepad -->
        <a class="hotspot expand-right" style="left: 48.57%; top: 54.51%;" href="#about-me">
            <span class="hotspot-icon">
                <svg width="13" height="11" viewBox="0 0 13 11" fill="none" xmlns="http://www.w3.org/2000/svg"
                    stroke="white">
                    <line x1="11.7" y1="4.7" x2="6.8" y2="9.6" stroke-width="2"></line>
                    <path d="M10.2 4.7L6.8 1.3" stroke-width="2"></path>
                    <line x1="10.5" y1="5.4" x2="0.9" y2="5.4" stroke-width="2"></line>
                </svg>
            </span>
            <span class="hotspot-text">About Me</span>
        </a>

        <!-- Marcel's Cup -->
        <a class="hotspot expand-left" style="left: 83.2%; top: 67%;" href="#projects">
            <span class="hotspot-icon">
                <svg width="13" height="11" viewBox="0 0 13 11" fill="none" xmlns="http://www.w3.org/2000/svg"
                    stroke="white">
                    <line x1="11.7" y1="4.7" x2="6.8" y2="9.6" stroke-width="2"></line>
                    <path d="M10.2 4.7L6.8 1.3" stroke-width="2"></path>
                    <line x1="10.5" y1="5.4" x2="0.9" y2="5.4" stroke-width="2"></line>
                </svg>
            </span>
            <span class="hotspot-text">Projects</span>
        </a>

        <!-- Lamp -->
        <a class="hotspot expand-right" style="left: 59.83%; top: 36%;" href="#hobbies">
            <span class="hotspot-icon">
                <svg width="13" height="11" viewBox="0 0 13 11" fill="none" xmlns="http://www.w3.org/2000/svg"
                    stroke="white">
                    <line x1="11.7" y1="4.7" x2="6.8" y2="9.6" stroke-width="2"></line>
                    <path d="M10.2 4.7L6.8 1.3" stroke-width="2"></path>
                    <line x1="10.5" y1="5.4" x2="0.9" y2="5.4" stroke-width="2"></line>
                </svg>
            </span>
            <span class="hotspot-text">Hobbies / Passions</span>
        </a>
    </div>

    <!-- Empty script since we removed temporary coordinate listener -->
    <!-- Modal for About Me -->
    <div id="about-me-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" aria-label="Close">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#5C4033" stroke-width="2">
                    <line x1="1" y1="1" x2="13" y2="13"></line>
                    <line x1="13" y1="1" x2="1" y2="13"></line>
                </svg>
            </button>
            <img src="about%20me.png" alt="About Me">
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
